services:
  canticle:
    image: ghcr.io/sydlexius/canticle:latest
    container_name: canticle
    restart: unless-stopped
    ports:
      - "50705:50705"
    environment:
      MXLRC_DOCKER: "true"
      MXLRC_SERVER_ADDR: "0.0.0.0:50705"
      # Enable the browser UI (overrides web_ui_enabled in config.toml).
      MXLRC_WEB_UI_ENABLED: "true"
      # Bootstrap the first web-UI admin on a headless host (the /setup page is
      # loopback/trusted-CIDR only). Both vars are required; the password must be
      # at least 8 characters. The bootstrap is idempotent (skipped once an admin
      # exists). Rotate the password in the UI and remove these vars after first
      # login. See docs/USER_GUIDE.md "Web UI enablement" for secret-hygiene guidance.
      # Supply MXLRC_WEBAUTH_ADMIN_PASSWORD from an uncommitted .env file -- never hardcode it here.
      # MXLRC_WEBAUTH_ADMIN_USER: "admin"
      # MXLRC_WEBAUTH_ADMIN_PASSWORD: "${MXLRC_WEBAUTH_ADMIN_PASSWORD}"
      PUID: "99"
      PGID: "100"
      MUSIXMATCH_TOKEN: "${MUSIXMATCH_TOKEN}"
      MXLRC_WEBHOOK_API_KEY: "${MXLRC_WEBHOOK_API_KEY}"
      # Optional: master key for encrypted-at-rest secrets (base64 of 32 bytes).
      # When set, takes precedence over the auto-generated key file and keeps the
      # key off the data volume (recommended for whole-volume-theft protection).
      # Generate once with: openssl rand -base64 32
      # Source from a .env file kept OUTSIDE the /config volume so the key and
      # the database are not in the same place.
      # Omit to use the zero-setup default: a 0600 key file auto-created at
      # /config/.mxlrcgo.key. See docs/USER_GUIDE.md "Encrypted secrets".
      MXLRC_MASTER_KEY: "${MXLRC_MASTER_KEY}"
    volumes:
      - canticle-config:/config
      - /path/to/your/data:/data:rw

volumes:
  canticle-config:
