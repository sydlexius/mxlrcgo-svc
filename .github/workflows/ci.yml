name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      # Always emits at least one matrix leg so GitHub can interpolate the job
      # name. Non-code PRs get a single placeholder leg marked skip='true' whose
      # build steps no-op. (An empty matrix, or a job skipped via `if:`, instead
      # surfaces the literal, unexpanded "Build (${{ matrix.goos }},
      # ${{ matrix.goarch }})" check name.)
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.goreleaser.yml'
              - '.golangci.yml'
              - '.grype.yaml'
              - 'Dockerfile'
              - 'build/docker/**'
              - 'web/**'

      - name: Compute build matrix
        id: matrix
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "true" ]; then
            echo 'matrix={"include":[{"goos":"linux","goarch":"amd64"},{"goos":"linux","goarch":"arm64"},{"goos":"darwin","goarch":"amd64"},{"goos":"darwin","goarch":"arm64"},{"goos":"windows","goarch":"amd64"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"goos":"linux","goarch":"amd64","skip":"true"}]}' >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # Generated web UI assets are no longer committed (issue #364); generate
      # them before linting so the embed + generated Go compile.
      - name: Install Tailwind standalone CLI (v4.2.0)
        run: bash scripts/install-tailwind.sh "$RUNNER_TEMP/tailwindcss"

      - name: Generate web UI assets (make generate)
        run: make generate TAILWIND="$RUNNER_TEMP/tailwindcss"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          # Weekly (not daily) lint-cache key rotation: a daily interval cold-
          # rebuilds the cache every calendar day and accretes ~7 entries/week.
          cache-invalidation-interval: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    # Pure correctness gate: no external-network calls, so a third-party outage
    # (e.g. Codecov) can never fail this required check. Coverage is shipped to
    # Codecov by the separate, non-required `coverage-upload` job.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # Generated web UI assets are no longer committed (issue #364); generate
      # them before the build/test step so the embed + generated Go compile.
      - name: Install Tailwind standalone CLI (v4.2.0)
        run: bash scripts/install-tailwind.sh "$RUNNER_TEMP/tailwindcss"

      - name: Generate web UI assets (make generate)
        run: make generate TAILWIND="$RUNNER_TEMP/tailwindcss"

      # Validate the freshly generated CSS (sentinel classes + size band).
      # Replaces the removed committed-drift "UI Assets" job: nothing is
      # committed to drift now, but a broken Tailwind run must still fail CI.
      - name: Validate generated web UI assets (make ui-validate)
        run: make ui-validate

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      security-events: write # required for upload-sarif to publish findings to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        # buildx + GHA layer cache reuses the nightly's exported BuildKit layers
        # instead of cold-building. load:true keeps mxlrcgo-svc:scan in the local
        # daemon so the grype scan step below can still find it.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: mxlrcgo-svc:scan
          cache-from: type=gha

      - name: Scan image for HIGH+ CVEs
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: mxlrcgo-svc:scan
          severity-cutoff: high
          fail-build: true
          grype-version: v0.114.0
          only-fixed: true # transient unfixable CVEs from vuln-DB updates cause flakes that cannot be actioned
          output-format: sarif

      - name: Upload SARIF artifact
        if: always() && steps.scan.outputs.sarif != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: grype-scan-sarif
          path: ${{ steps.scan.outputs.sarif }}
          retention-days: 1

      - name: Upload to Security tab
        if: always() && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Summarize findings on failure
        if: failure()
        env:
          SARIF_FILE: ${{ steps.scan.outputs.sarif }}
        run: |
          if [ -z "$SARIF_FILE" ] || [ ! -f "$SARIF_FILE" ]; then
            echo "No SARIF output file found; skipping summary."
            exit 0
          fi
          echo "=== Grype findings summary ==="
          jq -r '
            .runs[0] |
            . as $run |
            ($run.tool.driver.rules // []) as $rules |
            .results[] |
            . as $result |
            ($rules | map(select(.id == $result.ruleId)) | first) as $rule |
            "CVE: \($result.ruleId)  severity: \(if $rule then ($rule.properties["security-severity"] // $rule.defaultConfiguration.level // "unknown") else "unknown" end)  package: \($result.message.text // "unknown")"
          ' "$SARIF_FILE" || { echo "(jq failed to parse SARIF)"; cat "$SARIF_FILE"; }

  grype-ignore-expiry:
    name: Grype Ignore Expiry Check
    runs-on: ubuntu-latest
    # Runs unconditionally (not gated on `changes`): a .grype.yaml ignore entry
    # expires by date, independent of whether code changed, so this policy check
    # must fire on every push/PR rather than only when the scan job runs.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check for expired ignore entries
        run: |
          if [ ! -f .grype.yaml ]; then
            echo "No .grype.yaml found, nothing to check."
            exit 0
          fi
          # escape_gha: escape %, CR, LF before echoing into GHA workflow
          # commands so untrusted .grype.yaml values cannot forge annotations.
          # Order matters: % must be escaped first (to %25) before CR/LF.
          escape_gha() { printf '%s' "$1" | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e 's/\n/%0A/g'; }
          today=$(date -u +%Y-%m-%d)
          errors=0
          vuln=""
          review_by=""
          reason=""
          while IFS= read -r line; do
            # Strip leading whitespace, then skip comments and blank lines
            trimmed=${line#"${line%%[![:space:]]*}"}
            case "$trimmed" in ''|'#'*) continue ;; esac
            case "$trimmed" in
              *"vulnerability:"*)
                # Check previous entry had valid review-by and reason
                if [ -n "$vuln" ]; then
                  if [ -z "$review_by" ]; then
                    echo "::error::Grype ignore missing review-by: $(escape_gha "$vuln")"
                    errors=$((errors + 1))
                  fi
                  if [ -z "$reason" ]; then
                    echo "::error::Grype ignore missing reason: $(escape_gha "$vuln")"
                    errors=$((errors + 1))
                  fi
                fi
                vuln=$(echo "$trimmed" | sed 's/.*vulnerability:[[:space:]]*//; s/"//g')
                review_by=""
                reason=""
                ;;
              *"review-by:"*)
                review_by=$(echo "$trimmed" | sed 's/.*review-by:[[:space:]]*//; s/"//g')
                if ! echo "$review_by" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
                  echo "::error::Invalid review-by format for $(escape_gha "$vuln"): $(escape_gha "$review_by") (expected YYYY-MM-DD)"
                  errors=$((errors + 1))
                elif ! date -ud "$review_by" +%s >/dev/null 2>&1; then
                  echo "::error::Invalid review-by date for $(escape_gha "$vuln"): $(escape_gha "$review_by")"
                  errors=$((errors + 1))
                # review-by is the last valid day; entry expires the day after
                elif [ "$today" '>' "$review_by" ]; then
                  echo "::error::Grype ignore expired: $(escape_gha "$vuln") (review-by: $(escape_gha "$review_by"))"
                  errors=$((errors + 1))
                else
                  days_left=$(( ( $(date -ud "$review_by" +%s) - $(date -ud "$today" +%s) ) / 86400 ))
                  echo "OK: $vuln (review-by: $review_by, ${days_left} days remaining)"
                fi
                ;;
              *"reason:"*)
                reason=$(echo "$trimmed" | sed 's/.*reason:[[:space:]]*//; s/"//g')
                ;;
            esac
          done < .grype.yaml
          # Check the last entry in the file
          if [ -n "$vuln" ]; then
            if [ -z "$review_by" ]; then
              echo "::error::Grype ignore missing review-by: $(escape_gha "$vuln")"
              errors=$((errors + 1))
            fi
            if [ -z "$reason" ]; then
              echo "::error::Grype ignore missing reason: $(escape_gha "$vuln")"
              errors=$((errors + 1))
            fi
          fi
          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} Grype ignore policy error(s). Review and fix the entries listed above."
            exit 1
          fi
          echo "All Grype ignore entries are within their review-by window."

  coverage-floor:
    name: Coverage Floor
    runs-on: ubuntu-latest
    needs: [test]
    # Enforce the per-package coverage floor (scripts/coverage-floor.json) against
    # the profile the Test job produced: a whole-package regression fails here even
    # when Codecov's line-level patch coverage passes. Pure file parsing (awk over
    # the profile + JSON), so no Go toolchain or network is needed. Only runs when
    # Test succeeded; a failed/skipped Test already gates the pipeline.
    if: needs.test.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage

      - name: Enforce per-package coverage floor
        run: bash scripts/coverage-floor.sh --cover coverage.out

  coverage-upload:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: [test]
    # Consumes the artifact produced by the Test job and ships it to Codecov.
    # Deliberately NOT a required status check: a Codecov outage may fail this
    # job, but it can never block a merge. Only runs when Test actually passed.
    if: needs.test.result == 'success'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.out
          # Upload only coverage.out; without this, Codecov's auto-search also
          # picks up scripts/coverage-floor.json (a config file, not a report).
          disable_search: true
          fail_ci_if_error: true
          use_oidc: true

  build-matrix:
    name: Build (${{ matrix.goos }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [changes, lint, test, coverage-floor]
    # Avoid a job-level `if: code == 'true'`: a skipped matrix job surfaces a check
    # named with the literal, unexpanded ${{ matrix.* }} template. Non-code PRs get
    # a single placeholder leg (skip='true', see the `changes` job) whose steps
    # no-op, so the check name still interpolates to a concrete goos/goarch.
    if: ${{ !cancelled() && needs.lint.result != 'failure' && needs.test.result != 'failure' && needs.coverage-floor.result != 'failure' }}
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - if: ${{ matrix.skip != 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - if: ${{ matrix.skip != 'true' }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # Generated web UI assets are no longer committed (issue #364); generate
      # them before the build so the go:embed of output.css resolves.
      - name: Install Tailwind standalone CLI (v4.2.0)
        if: ${{ matrix.skip != 'true' }}
        run: bash scripts/install-tailwind.sh "$RUNNER_TEMP/tailwindcss"

      - name: Generate web UI assets (make generate)
        if: ${{ matrix.skip != 'true' }}
        run: make generate TAILWIND="$RUNNER_TEMP/tailwindcss"

      - name: Build binary
        if: ${{ matrix.skip != 'true' }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o mxlrcgo-svc ./cmd/mxlrcgo-svc

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, build-matrix]
    if: always()
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes detected, skipping build"
            exit 0
          fi
          result="${{ needs.build-matrix.result }}"
          # "skipped" means a required upstream job (e.g. lint) failed and the
          # matrix never ran -- that upstream failure is reported separately.
          # Only exit 1 when the matrix itself encountered a job failure.
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Build matrix failed or cancelled: $result"
            exit 1
          fi
