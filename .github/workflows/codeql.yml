name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9cea5827c668a1fe7165dbce6e80c3f9cf3f83ac # v4
        with:
          languages: go

      # Generated web UI assets are no longer committed (issue #364); generate
      # them before the traced build so the go:embed of output.css and the
      # generated *_templ.go compile. The build below stays a bare `go build`
      # so CodeQL still traces the real analyzed build.
      - name: Install Tailwind standalone CLI (v4.2.0)
        run: bash scripts/install-tailwind.sh "$RUNNER_TEMP/tailwindcss"

      - name: Generate web UI assets (make generate)
        run: make generate TAILWIND="$RUNNER_TEMP/tailwindcss"

      - name: Build
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@09dec6cc8c147fd5737df267d90a7d19cd5ff9ea # v4
        with:
          category: /language:go
