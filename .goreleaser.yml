version: 2

builds:
  - id: mxlrcgo-svc
    main: ./cmd/mxlrcgo-svc
    binary: mxlrcgo-svc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

dockers_v2:
  - id: mxlrcgo-svc
    images:
      - "ghcr.io/sydlexius/mxlrcgo-svc"
    # dockers_v2 ignores empty tag templates, so prerelease gating is encoded
    # by emitting "" for the disallowed branch:
    #   :VERSION       always
    #   :MAJOR.MINOR   non-prerelease only
    #   :latest        non-prerelease only
    #   :beta          prerelease only
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}{{ .Major }}.{{ .Minor }}{{ end }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
      - "{{ if .Prerelease }}beta{{ end }}"
    dockerfile: build/docker/Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - build/docker/entrypoint.sh

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
      - --yes
    signature: ${artifact}.sig
    certificate: ${artifact}.pem

docker_signs:
  - cmd: cosign
    args:
      - sign
      - --yes
      - ${artifact}

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: Refactoring
      regexp: '^refactor(\(.+\))?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^ci:'
      - '^style:'
      - '^test:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sydlexius
    name: mxlrcgo-svc
  prerelease: auto
  make_latest: '{{ if .Prerelease }}false{{ else }}true{{ end }}'
  header: |
    ## mxlrcgo-svc {{ .Tag }}

    {{ if .Prerelease }}> This is a pre-release version. Use the `beta` Docker tag to try it out.{{ end }}
  footer: |
    **Docker:** `docker pull ghcr.io/sydlexius/mxlrcgo-svc:{{ .Version }}`

    {{- if .PreviousTag }}
    **Full Changelog:** [{{ .PreviousTag }}...{{ .Tag }}](https://github.com/sydlexius/mxlrcgo-svc/compare/{{ .PreviousTag }}...{{ .Tag }})
    {{- else }}
    **Full Changelog:** [{{ .Tag }}](https://github.com/sydlexius/mxlrcgo-svc/releases/tag/{{ .Tag }})
    {{- end }}
