name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      # Emitted here so non-code PRs get an empty matrix (zero build legs, zero
      # checks) instead of a skipped build job whose check surfaces the literal,
      # unexpanded "Build (${{ matrix.goos }}, ${{ matrix.goarch }})" name.
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
              - '.goreleaser.yml'
              - '.golangci.yml'
              - 'Dockerfile'
              - 'build/docker/**'

      - name: Compute build matrix
        id: matrix
        run: |
          if [ "${{ steps.filter.outputs.code }}" = "true" ]; then
            echo 'matrix={"include":[{"goos":"linux","goarch":"amd64"},{"goos":"linux","goarch":"arm64"},{"goos":"darwin","goarch":"amd64"},{"goos":"darwin","goarch":"arm64"},{"goos":"windows","goarch":"amd64"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.4

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.out
          fail_ci_if_error: true
          use_oidc: true

  scan:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t mxlrcgo-svc:scan -f Dockerfile .

      - name: Scan image for HIGH+ CVEs
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: mxlrcgo-svc:scan
          severity-cutoff: high
          fail-build: true

  build-matrix:
    name: Build (${{ matrix.goos }}, ${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    # Avoid a job-level `if: code == 'true'`: a skipped matrix job surfaces a check
    # named with the literal, unexpanded ${{ matrix.* }} template. Running unless
    # lint or test failed keeps the matrix empty on non-code PRs (see the `changes`
    # job), so this expands to zero legs and zero checks.
    if: ${{ !cancelled() && needs.lint.result != 'failure' && needs.test.result != 'failure' }}
    strategy:
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o mxlrcgo-svc ./cmd/mxlrcgo-svc

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, build-matrix]
    if: always()
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "No code changes detected, skipping build"
            exit 0
          fi
          if [ "${{ needs.build-matrix.result }}" != "success" ]; then
            echo "Build matrix failed"
            exit 1
          fi
