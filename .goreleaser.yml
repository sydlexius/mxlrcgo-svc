version: 2

builds:
  - id: mxlrcgo-svc
    main: ./cmd/mxlrcgo-svc
    binary: mxlrcgo-svc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: Refactoring
      regexp: '^refactor(\(.+\))?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^ci:'
      - '^style:'
      - '^test:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sydlexius
    name: mxlrcgo-svc
  prerelease: auto
  make_latest: auto
