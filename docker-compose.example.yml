services:
  mxlrcgo-svc:
    image: ghcr.io/sydlexius/mxlrcgo-svc:latest
    container_name: mxlrcgo-svc
    restart: unless-stopped
    ports:
      - "50705:50705"
    environment:
      MXLRC_DOCKER: "true"
      MXLRC_SERVER_ADDR: "0.0.0.0:50705"
      MXLRC_OUTPUT_DIR: "/music"
      PUID: "99"
      PGID: "100"
      MUSIXMATCH_TOKEN: "${MUSIXMATCH_TOKEN}"
      MXLRC_WEBHOOK_API_KEY: "${MXLRC_WEBHOOK_API_KEY}"
    volumes:
      - mxlrcgo-svc-config:/config
      - /path/to/your/music:/music:rw

volumes:
  mxlrcgo-svc-config:
