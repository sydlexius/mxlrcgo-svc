# mxlrcgo-svc configuration file
# Copy to ~/.config/mxlrcgo-svc/config.toml and edit as needed.
# Environment variable overrides (in precedence order): MUSIXMATCH_TOKEN,
# MXLRC_API_TOKEN, MXLRC_API_COOLDOWN (or MXLRC_COOLDOWN),
# MXLRC_API_CIRCUIT_OPEN_DURATION, MXLRC_OUTPUT_DIR,
# MXLRC_DB_PATH, MXLRC_SERVER_ADDR, MXLRC_WEBHOOK_API_KEY,
# MXLRC_PROVIDER_PRIMARY, MXLRC_PROVIDERS_DISABLED,
# MXLRC_VERIFICATION_ENABLED, MXLRC_VERIFICATION_WHISPER_URL,
# MXLRC_VERIFICATION_FFMPEG_PATH,
# MXLRC_VERIFICATION_SAMPLE_DURATION_SECONDS, MXLRC_VERIFICATION_MIN_CONFIDENCE,
# MXLRC_VERIFICATION_MIN_SIMILARITY, MXLRC_DOCKER

[api]
# Musixmatch API token (required).
# Overrides (highest to lowest): --token flag, MUSIXMATCH_TOKEN env, MXLRC_API_TOKEN env.
# token = "your-token-here"

# Cooldown between API requests in seconds.
cooldown = 15

# Worker circuit-breaker window in seconds. When the upstream API returns a
# rate-limit (HTTP 429) or unauthorized (HTTP 401) signal, the worker stops
# dequeuing for this many seconds before resuming. Default 1800 (30 min);
# minimum 300 (5 min) -- smaller values are clamped at load time.
circuit_open_duration = 1800

# Escalating re-check cadence for benign misses (no matching track or no
# usable lyrics). The delay doubles each miss: base, 2*base, 4*base, ... up to
# cap. Overrides: MXLRC_MISS_BACKOFF_BASE_HOURS, MXLRC_MISS_BACKOFF_CAP_HOURS.
# miss_backoff_base_hours = 168   # initial re-check delay (hours; 7 days); minimum 1
# miss_backoff_cap_hours = 672    # maximum re-check delay (hours; 28 days)

# Maximum number of miss fetches before retiring the queue row.
# Retire after N miss fetches: when miss_count reaches this value the row is
# closed (work_queue and linked scan_results both set to status=done,
# last_error="miss limit reached"). This is terminal under current providers;
# a future multi-source sweep (issue #103d) could revive it.
# Default 15 (~1 year with the 7d base cadence). Set to 0 for no cap.
# Override: MXLRC_MAX_MISS_ATTEMPTS.
# max_miss_attempts = 15

[output]
# Default output directory for .lrc files.
dir = "lyrics"

[db]
# Path to SQLite database file.
# Default: ~/.local/share/mxlrcgo-svc/mxlrcgo.db
# path = "/custom/path/mxlrcgo.db"

[server]
# HTTP listen address for --serve mode.
addr = "127.0.0.1:3876"

# API keys accepted by webhook endpoints. Generate/store these outside the file
# when possible; MXLRC_WEBHOOK_API_KEY can also provide one or more comma-separated keys.
# webhook_api_keys = ["mxlrc_your-webhook-key"]

# Scheduler scan interval in seconds for `serve` mode (env: MXLRC_SCAN_INTERVAL).
# Default 900. Set to 0 to scan once and not repeat. The --scan-interval flag
# overrides this value.
# scan_interval_seconds = 900

# Worker poll interval in seconds for `serve` mode (env: MXLRC_WORK_INTERVAL).
# Default 0, which falls back to api.cooldown. Clamped to a 15-second floor.
# The --work-interval flag overrides this value.
# work_interval_seconds = 0

[providers]
# Active lyrics provider. Musixmatch is currently the only supported provider.
primary = "musixmatch"

# Provider names to disable explicitly.
disabled = []

[verification]
# Optional STT verification for low-confidence scanned audio.
enabled = false
whisper_url = ""
ffmpeg_path = "ffmpeg"
sample_duration_seconds = 30
min_confidence = 0.85
min_similarity = 0.35
