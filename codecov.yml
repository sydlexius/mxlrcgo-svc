coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 70%
        threshold: 0%

ignore:
  # Application entrypoint: main.go wires config, DB, and the dependency
  # graph and runs app.App.Run. It owns no business logic and is not
  # unit-testable without a full integration harness. scripts/pre-push-gate.sh
  # mirrors this exclusion via PATCH_COVERAGE_EXCLUDE so the local patch
  # coverage estimate and Codecov agree on scope.
  - "cmd/mxlrcgo-svc/main.go"
  # Dev-only synthetic-library generator. Its logic lives in (and is tested via)
  # internal/testutil.GenerateLibrary; main.go is just flag wiring and is not
  # shipped (excluded from GoReleaser's build allowlist).
  - "cmd/genlib/main.go"
  # Generated templ output (make ui / `templ generate`). Authored from the
  # *.templ sources and CI-verified current via `make ui-check`; the rendered
  # behavior is covered by internal/web tests, not by counting generated lines.
  - "web/templates/*_templ.go"
