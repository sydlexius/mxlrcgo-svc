version: 2

project_name: canticle

# Generate the web UI assets before any platform build. They are no longer
# committed (issue #364): web/static/embed.go embeds web/static/css/output.css at
# COMPILE TIME, so templ + Tailwind must run before the `builds:` below compile
# the binaries. install-tailwind.sh downloads + sha256-verifies the node-free
# Tailwind standalone CLI (auto-detecting the runner's OS/arch).
before:
  hooks:
    - scripts/install-tailwind.sh ./.tools/tailwindcss
    - go tool templ generate
    - ./.tools/tailwindcss -i web/static/css/input.css -o web/static/css/output.css --minify

builds:
  - id: canticle
    main: ./cmd/mxlrcgo-svc
    binary: canticle
    env:
      - CGO_ENABLED=0
    # -trimpath: reproducible builds; strips local source paths from the binary.
    # Parity with the root Dockerfile and ci.yml build so every shipped artifact matches.
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      # Inject build metadata into internal/commands (overrides the "dev"
      # defaults). GoReleaser only auto-injects these when ldflags is unset, so
      # they are wired explicitly here. CommitDate (not Date) keeps the build
      # reproducible, matching the -trimpath stance above.
      - -X github.com/sydlexius/mxlrcgo-svc/internal/version.Version={{ .Version }}
      - -X github.com/sydlexius/mxlrcgo-svc/internal/version.Commit={{ .Commit }}
      - -X github.com/sydlexius/mxlrcgo-svc/internal/version.Date={{ .CommitDate }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: canticle
    ids:
      - default
    # Renamed from the pre-rebrand "mxlrcgo-svc" cask (issue #388). Unlike the
    # nfpm packages, a cask cannot self-replace the old token; conflicts_with
    # just prevents both being installed at once. Auto-migration of an existing
    # `brew install sydlexius/tap/mxlrcgo-svc` needs a cask_renames entry in the
    # sydlexius/homebrew-tap repo (tracked separately) plus removal of the stale
    # Casks/mxlrcgo-svc.rb there.
    conflicts:
      - cask: mxlrcgo-svc
    # ffmpeg is only needed for the optional audio verification/instrumental
    # sidecar; it is NOT a required runtime dependency and is not listed here.
    binaries:
      - canticle
    repository:
      owner: sydlexius
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://sydlexius.github.io/canticle/
    description: Fetch synced lyrics from Musixmatch and save them as .lrc files
    caveats: |
      Set your Musixmatch token via MUSIXMATCH_TOKEN or in the config file:
        ~/.config/mxlrcgo-svc/config.toml (XDG path)
        See config.example.toml for all available options.
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "feat: update canticle cask to {{ .Tag }}"
    skip_upload: auto

nfpms:
  - id: canticle
    package_name: canticle
    ids:
      - canticle
    # Upgrade path from the pre-rebrand package (issue #388). The Linux packages
    # were named "mxlrcgo-svc" through v1.9.1; this transitions installs to the
    # "canticle" name in a single step. nfpm maps these per format:
    #   deb -> Replaces + Provides (+ Conflicts, set in overrides.deb below)
    #   rpm -> Obsoletes + Provides
    #   apk -> replaces + provides
    # Replaces/Obsoletes remove the old mxlrcgo-svc package outright, so any
    # stale binary it owned (v1.6.0/v1.7.0 installed /usr/local/bin/mxlrcgo-svc;
    # v1.8.0+ already ship /usr/local/bin/canticle) is cleaned up. The unit,
    # config, and state paths stay under /var/lib/mxlrcgo-svc et al. so the
    # SQLite DB and any (non-Docker) service install survive the transition.
    #
    # Conflicts is deb-only (set in overrides.deb), NOT a top-level field: the
    # Debian rename idiom is Replaces+Conflicts to force removal of the old
    # package, but the Fedora idiom is Obsoletes+Provides WITHOUT Conflicts -- an
    # rpm Conflicts tag makes `rpm`/`dnf` treat mxlrcgo-svc as a blocking
    # conflict and breaks the in-place upgrade. apk needs only replaces+provides.
    replaces:
      - mxlrcgo-svc
    provides:
      - mxlrcgo-svc
    vendor: sydlexius
    homepage: https://sydlexius.github.io/canticle/
    maintainer: sydlexius <maintainer@placeholder.example>
    description: Fetch synced lyrics from Musixmatch and save them as .lrc files
    license: GPL-3.0
    bindir: /usr/local/bin
    formats:
      - deb
      - rpm
      - apk
    # Default contents and scripts apply to rpm (and as a fallback base).
    # deb and apk use overrides below to adjust service unit path and init system.
    contents:
      - src: config.example.toml
        dst: /etc/mxlrcgo-svc/config.example.toml
        type: config|noreplace
      - src: build/package/mxlrcgo-svc.service
        dst: /usr/lib/systemd/system/mxlrcgo-svc.service
    scripts:
      postinstall: build/package/postinstall.sh
      preremove: build/package/preremove.sh
    overrides:
      # Debian places systemd units under /lib/systemd/system/.
      deb:
        # Conflicts is the Debian rename idiom (with Replaces) and forces the old
        # mxlrcgo-svc package's removal on upgrade. Kept out of rpm/apk on purpose
        # (see the package-rename note above).
        conflicts:
          - mxlrcgo-svc
        contents:
          - src: config.example.toml
            dst: /etc/mxlrcgo-svc/config.example.toml
            type: config|noreplace
          - src: build/package/mxlrcgo-svc.service
            dst: /lib/systemd/system/mxlrcgo-svc.service
        scripts:
          postinstall: build/package/postinstall.sh
          preremove: build/package/preremove.sh
      # Alpine uses OpenRC; no systemd unit, no systemctl in lifecycle scripts.
      apk:
        contents:
          - src: config.example.toml
            dst: /etc/mxlrcgo-svc/config.example.toml
            type: config|noreplace
          - src: build/package/mxlrcgo-svc.openrc
            dst: /etc/init.d/mxlrcgo-svc
            file_info:
              mode: 0755
        scripts:
          postinstall: build/package/postinstall-apk.sh
          preremove: build/package/preremove-apk.sh

dockers_v2:
  - id: canticle
    images:
      - "ghcr.io/sydlexius/canticle"
    # dockers_v2 ignores empty tag templates, so prerelease gating is encoded
    # by emitting "" for the disallowed branch:
    #   :VERSION       always
    #   :MAJOR.MINOR   non-prerelease only
    #   :latest        non-prerelease only
    #   :beta          prerelease only
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}{{ .Major }}.{{ .Minor }}{{ end }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
      - "{{ if .Prerelease }}beta{{ end }}"
    dockerfile: build/docker/Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    extra_files:
      - build/docker/entrypoint.sh

signs:
  - artifacts: checksum
    cmd: cosign
    # cosign v3 unified Sigstore bundle: a single ${artifact}.sigstore.json
    # carries the signature, certificate, and Rekor entry (replaces the separate
    # .sig/.pem from the v2 --output-signature/--output-certificate flags).
    output: true
    args:
      - sign-blob
      - --new-bundle-format
      - --bundle=${signature}
      - ${artifact}
      - --yes
    signature: ${artifact}.sigstore.json

docker_signs:
  - cmd: cosign
    args:
      - sign
      - --yes
      # Sign by immutable digest, not the mutable tag reference. dockers_v2
      # produces multiple logical tags (:VERSION, :MAJOR.MINOR, :latest,
      # :beta) all pointing at the same image; signing ${artifact} alone
      # races against concurrent tag updates, while ${artifact}@${digest}
      # pins the signature to the specific image content.
      - ${artifact}@${digest}

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: Refactoring
      regexp: '^refactor(\(.+\))?:'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore:'
      - '^docs:'
      - '^ci:'
      - '^style:'
      - '^test:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sydlexius
    name: canticle
  prerelease: auto
  make_latest: '{{ if .Prerelease }}false{{ else }}true{{ end }}'
  header: |
    ## Canticle {{ .Tag }}

    {{ if .Prerelease }}> This is a pre-release version. Use the `beta` Docker tag to try it out.{{ end }}
  footer: |
    **Docker:** `docker pull ghcr.io/sydlexius/canticle:{{ .Version }}`

    {{- if .PreviousTag }}
    **Full Changelog:** [{{ .PreviousTag }}...{{ .Tag }}](https://github.com/sydlexius/canticle/compare/{{ .PreviousTag }}...{{ .Tag }})
    {{- else }}
    **Full Changelog:** [{{ .Tag }}](https://github.com/sydlexius/canticle/releases/tag/{{ .Tag }})
    {{- end }}
